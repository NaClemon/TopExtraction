name: Deploy Godot Project

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          # 현재 프로젝트가 설정된 Godot 버전에 맞춰 지정하세요. (예: 4.3.0, 4.6.0 등)
          # project.godot의 "4.6" 설정을 기준으로 기본값을 4.6.0으로 지정합니다.
          version: 4.6.0
          use-dotnet: false
          include-templates: true

      - name: Create export directory
        run: |
          mkdir -p build/web

      - name: Export Web
        run: |
          godot --headless --export-release "Web" build/web/index.html

      - name: Download coi-serviceworker for SharedArrayBuffer & WebGL support
        run: |
          curl -fsSL -o build/web/coi-serviceworker.js https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.js

      # -------------------------------------------------------------
      # 1. GitHub Pages 배포 (main 또는 master 브랜치에 푸시될 때 실행)
      # -------------------------------------------------------------
      - name: Upload GitHub Pages Artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: deployment
        uses: actions/deploy-pages@v4

      # -------------------------------------------------------------
      # 2. GitHub Releases 배포 (v1.0.0 같은 버전 태그를 푸시할 때 실행)
      # -------------------------------------------------------------
      - name: Zip Build for Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/web && zip -r ../../web-build.zip .

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: web-build.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
